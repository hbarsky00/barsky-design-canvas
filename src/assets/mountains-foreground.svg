<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="none" aria-hidden="true">
  <title>Mountain foreground silhouette</title>
  <!-- Back range: softer, lower, lighter when tinted via CSS currentColor opacity -->
  <g fill="currentColor" fill-opacity="0.55">
    <path d="M0,360
             L120,300 L210,330 L300,260 L390,300 L470,250 L560,295
             L660,235 L760,280 L860,225 L960,275 L1060,240
             L1180,285 L1290,255 L1400,295 L1500,265 L1600,300
             L1600,500 L0,500 Z"/>
  </g>

  <!-- Mid range -->
  <g fill="currentColor" fill-opacity="0.78">
    <path d="M0,420
             L90,360 L160,395 L250,320 L330,375 L430,295 L520,360
             L610,300 L720,355 L820,285 L920,345 L1020,300
             L1120,355 L1230,310 L1340,370 L1450,330 L1550,365 L1600,345
             L1600,500 L0,500 Z"/>
  </g>

  <!-- Front range: tallest, sharpest, fully opaque -->
  <g fill="currentColor">
    <path d="M0,500
             L0,440
             L70,400 L150,455 L230,380 L310,440 L380,360
             L460,430 L540,330 L620,420 L700,355 L790,300
             L870,400 L955,345 L1040,420 L1120,360 L1210,310
             L1290,395 L1380,340 L1470,415 L1545,365 L1600,420
             L1600,500 Z"/>
    <!-- Tiny snow caps on the two highest peaks (790 and 1210) -->
    <path d="M770,316 L790,300 L808,320 L800,322 L792,314 L784,322 Z" fill-opacity="0.85"/>
    <path d="M1192,326 L1210,310 L1228,330 L1219,332 L1212,324 L1204,332 Z" fill-opacity="0.85"/>
  </g>
</svg>
