<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="none" aria-hidden="true">
  <title>Mountain foreground silhouette</title>
  <!-- Back range: softer, lower, lighter when tinted via CSS currentColor opacity -->
  <g fill="currentColor" fill-opacity="0.55">
    <path d="M0,360
             L120,300 L210,330 L300,260 L390,300 L470,250 L560,295
             L660,235 L760,280 L860,225 L960,275 L1060,240
             L1180,285 L1290,255 L1400,295 L1500,265 L1600,300
             L1600,500 L0,500 Z"/>
  </g>

  <!-- Mid range -->
  <g fill="currentColor" fill-opacity="0.78">
    <path d="M0,420
             L90,360 L160,395 L250,320 L330,375 L430,295 L520,360
             L610,300 L720,355 L820,285 L920,345 L1020,300
             L1120,355 L1230,310 L1340,370 L1450,330 L1550,365 L1600,345
             L1600,500 L0,500 Z"/>
  </g>

  <!-- Front range: fewer, taller, asymmetric summits with snow caps -->
  <g fill="currentColor">
    <path d="M0,500
             L0,450
             L80,420 L160,440 L230,400
             L330,300 L410,360 L470,340
             L560,395 L640,365
             L760,260 L840,330 L900,310
             L1000,380 L1080,355
             L1200,290 L1290,350 L1360,330
             L1460,395 L1540,370 L1600,400
             L1600,500 Z"/>
    <!-- Snow caps on the three tallest summits: 330,300 / 760,260 / 1200,290 -->
    <path d="M300,330 L330,300 L362,334
             L352,338 L344,330 L334,340 L324,330 L314,338 Z"
          fill="hsl(0 0% 100%)" fill-opacity="0.9"/>
    <path d="M728,294 L760,260 L794,296
             L782,300 L772,290 L760,302 L748,290 L738,300 Z"
          fill="hsl(0 0% 100%)" fill-opacity="0.92"/>
    <path d="M1170,322 L1200,290 L1232,324
             L1222,328 L1212,318 L1200,330 L1188,318 L1180,328 Z"
          fill="hsl(0 0% 100%)" fill-opacity="0.9"/>
  </g>
</svg>
