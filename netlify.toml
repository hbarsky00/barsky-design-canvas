[build]
  # Full SEO pipeline: sitemap generation -> vite build -> per-route prerendered
  # HTML in dist/. Plain `vite build` would ship one untitled HTML shell for
  # every URL and no fresh sitemap.
  command = "npm run build"
  publish = "dist"

# ---------------------------------------------------------------------------
# Redirects. Note: prerendered pages need no rules here — dist/<route>/index.html
# physical files are served automatically and take precedence over redirects.
# ---------------------------------------------------------------------------

# www to apex (must be first, with force flag)
[[redirects]]
  from = "https://www.barskydesign.pro/*"
  to = "https://barskydesign.pro/:splat"
  status = 301
  force = true

# Uploads folder renamed from the Lovable-era path; old URLs stay valid.
[[redirects]]
  from = "/lovable-uploads/*"
  to = "/uploads/:splat"
  status = 301

# --- Removed/renamed pages Google has indexed -> nearest live equivalent ---

[[redirects]]
  from = "/design-services"
  to = "/services"
  status = 301

[[redirects]]
  from = "/web-development"
  to = "/design-services/web-development"
  status = 301

[[redirects]]
