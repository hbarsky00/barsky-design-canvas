# --- Trailing slash normalization (prevent duplicate content) ---

[[redirects]]
  from = "/project/:project/"
  to = "/project/:project"
  status = 301

[[redirects]]
  from = "/case-studies/:study/"
  to = "/case-studies/:study"
  status = 301

[[redirects]]
  from = "/blog/:slug/"
  to = "/blog/:slug"
  status = 301

# --- Client-only utility routes that must keep serving the SPA with 200 ---

[[redirects]]
  from = "/store/success"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/__seo-check"
  to = "/index.html"
  status = 200

# --- Everything else: serve the SPA shell with a real 404 status. ---
# Every indexable route has a physical prerendered file (served before this
# rule), so only unknown/delisted URLs land here. The React app still renders
# (the catch-all route shows the NotFound page), but crawlers get an honest
# 404 instead of an infinite supply of soft-404s.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "no-cache"
